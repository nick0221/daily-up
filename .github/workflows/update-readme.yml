name: Auto Update README

on:
  schedule:
    # Runs every hour (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decide whether to update
        id: decide
        shell: bash
        run: |
          # 70% chance to update
          if (( RANDOM % 100 < 70 )); then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip this run
        if: steps.decide.outputs.update == 'false'
        run: echo "Skipping this scheduled run."

      - name: Update README
        if: steps.decide.outputs.update == 'true'
        shell: bash
        run: |
          quotes=(
            "Talk is cheap. Show me the code. — Linus Torvalds"
            "Programs must be written for people to read. — Harold Abelson"
            "First, solve the problem. Then, write the code. — John Johnson"
            "Simplicity is the soul of efficiency. — Austin Freeman"
            "Make it work, make it right, make it fast. — Kent Beck"
            "Code never lies, comments sometimes do. — Ron Jeffries"
            "The best error message is the one that never shows up. — Thomas Fuchs"
            "Deleted code is debugged code. — Jeff Sickel"
            "Premature optimization is the root of all evil. — Donald Knuth"
            "Experience is the name everyone gives to their mistakes. — Oscar Wilde"
            "Walking on water and developing software from a specification are easy if both are frozen. — Edward V. Berard"
            "Before software can be reusable it first has to be usable. — Ralph Johnson"
            "The function of good software is to make the complex appear simple. — Grady Booch"
            "Fix the cause, not the symptom. — Steve Maguire"
            "Testing leads to failure, and failure leads to understanding. — Burt Rutan"
            "Any fool can write code that a computer can understand. Good programmers write code that humans can understand. — Martin Fowler"
            "The only way to learn a new programming language is by writing programs in it. — Dennis Ritchie"
            "Truth can only be found in one place: the code. — Robert C. Martin"
            "Good code is its own best documentation. — Steve McConnell"
            "Knowledge is power. — Francis Bacon"
          )

          quote=${quotes[$((RANDOM % ${#quotes[@]}))]}

          random_number=$((10000 + RANDOM))

          cat > README.md <<EOF
          # Daily Up

          🤖 This README is automatically updated by GitHub Actions.

          ## Last Update (UTC)

          $(date -u +"%A, %d %B %Y %H:%M:%S UTC")

          ## Random Number

          $random_number

          ## Random Programming Quote

          > $quote
          EOF

      - name: Commit and Push
        if: steps.decide.outputs.update == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "docs: auto update README ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
